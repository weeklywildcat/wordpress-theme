name: Release theme ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Package and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create clean package directory
        run: |
          mkdir -p build/weekly-wildcat
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='vendor' \
            ./ build/weekly-wildcat/

      - name: Create ZIP
        run: |
          cd build
          zip -r weekly-wildcat.zip weekly-wildcat

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" build/weekly-wildcat.zip --generate-notes
