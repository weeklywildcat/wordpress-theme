name: Theme checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate theme files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Validate JSON files
        run: find . -name '*.json' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null

      - name: Check required block theme files
        run: |
          test -f style.css
          test -f index.php
          test -f theme.json
          test -f templates/index.html
          test -d parts
          test -d patterns

      - name: Check pattern headers
        run: |
          for file in patterns/*.php; do
            grep -q "Title:" "$file"
            grep -q "Slug:" "$file"
            grep -q "Categories:" "$file"
          done

      - name: Check template accessibility anchors
        run: |
          grep -q 'href="#content"' parts/header.html
          grep -q 'id="content"' templates/*.html
          grep -q ':focus-visible' style.css

      - name: Check search labels
        run: |
          grep -q '"label":"Search the newspaper"' templates/search.html
          grep -q '"showLabel":true' templates/search.html
          grep -q '"showLabel":true' templates/404.html

      - name: Check placeholder links
        run: |
          ! grep -R 'href="#"' . --exclude-dir=.git
